name: workflow_did_to_auditor
description: DiD analysis output fed to auditor — auditor builds on it rather than starting over
layer: 5
references:
  - references/assumptions/did.md
  - references/method-registry.md
  - references/lessons.md
steps:
  - skill: causal-did
    scenario: |
      I have panel data for 100 stores over 24 months. Half got a new checkout
      system at month 12. I want to estimate the effect on sales using DiD. I use R.
      Please walk me through the full analysis.
    references:
      - references/assumptions/did.md
      - references/method-registry.md
      - references/lessons.md
  - skill: causal-auditor
    input_from: step_1
    scenario: |
      Based on the DiD analysis above, identify:
      1. Any specific threats to validity the analysis didn't address
      2. Additional robustness checks needed beyond what was already proposed
      3. Overall credibility assessment given the store selection context
      Focus on gaps and threats the DiD skill missed. Do NOT repeat checks already performed.
    references:
      - references/assumptions/did.md
      - references/method-registry.md
      - references/lessons.md
rubric:
  - "Does the auditor reference specific elements of the DiD analysis (not generic DiD threats)?"
  - "Does the auditor identify any gaps the DiD skill's analysis might have (e.g., composition stability, spillovers)?"
  - "Does the auditor avoid repeating checks the DiD skill already performed?"
  - "Does the auditor add value beyond what the DiD skill provided (deeper scrutiny, additional threats)?"
  - "Is the combined output useful — could a practitioner follow both sequentially and have a complete analysis?"
