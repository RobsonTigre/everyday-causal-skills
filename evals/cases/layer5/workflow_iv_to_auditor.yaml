name: workflow_iv_to_auditor
description: IV analysis with borderline F-stat fed to auditor — auditor should push harder
layer: 5
references:
  - references/assumptions/iv.md
  - references/method-registry.md
  - references/lessons.md
steps:
  - skill: causal-iv
    scenario: |
      I'm estimating the effect of private tutoring on test scores using distance
      to the nearest tutoring center as an instrument. I have data on 3000 students.
      I use R. Please walk me through the analysis.
    references:
      - references/assumptions/iv.md
      - references/method-registry.md
      - references/lessons.md
  - skill: causal-auditor
    input_from: step_1
    scenario: |
      You have reviewed the IV analysis above. Provide a focused audit:
      1. Is distance to tutoring center truly exogenous? What confounds could correlate with distance?
      2. Is the first-stage F-statistic sufficient, and what changes if it's borderline?
      3. What unobserved confounders would destroy this analysis?
      Focus on gaps and threats the IV skill missed. Do NOT repeat checks already performed.
    references:
      - references/assumptions/iv.md
      - references/method-registry.md
      - references/lessons.md
rubric:
  - "Does the auditor scrutinize the exclusion restriction more deeply than the IV skill did?"
  - "Does the auditor assess instrument strength independently (not just accept the IV skill's judgment)?"
  - "Does the auditor raise threats the IV skill might have glossed over (e.g., distance correlates with urban/rural, SES)?"
  - "Does the auditor provide a clear overall assessment of the analysis's credibility?"
  - "Does the combined IV + audit workflow give the practitioner a more complete and honest picture than either alone?"
