name: rdd_pedagogy_clean
description: RDD skill with clean cutoff — must explain local identification clearly
layer: 4
skill: causal-rdd
references:
  - references/assumptions/rdd.md
  - references/method-registry.md
  - references/lessons.md
dataset: evals/data/rdd_clean.csv
user_message: |
  Students scoring >= 70 on an entrance exam get admitted to an honors program.
  I want to estimate the effect of the honors program on final GPA. I have data
  on 5000 students. I use R and have never done an RDD before.
rubric:
  pedagogy:
    - "Does the response explain the key insight of RDD — that students just above and below the cutoff are comparable?"
    - "Does the response explain what 'local' means — the estimate applies near the cutoff, not everywhere?"
    - "Does the response explain bandwidth selection and why it involves a bias-variance trade-off?"
  safety:
    - "Does the response explain the density test (rddensity) and why manipulation at the cutoff would invalidate the design?"
    - "Does the response mention that the RDD estimate is a LATE at the cutoff, not the ATE for all students?"
  actionable:
    - "Does the response provide code using rdrobust (or equivalent) with proper bandwidth selection?"
    - "Does the response include the RD plot and density test as required diagnostics?"
