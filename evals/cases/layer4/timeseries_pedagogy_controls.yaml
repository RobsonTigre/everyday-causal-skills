name: timeseries_pedagogy_controls
description: Timeseries with control series — must explain CausalImpact-specific concepts
layer: 4
skill: causal-timeseries
references:
  - references/assumptions/timeseries.md
  - references/method-registry.md
  - references/lessons.md
dataset: evals/data/timeseries_causalimpact_controls_l3.csv
user_message: |
  We launched a new pricing strategy 30 months ago. I have monthly revenue data for
  80 months total and two control series: a competitor's revenue (not affected by our
  pricing change) and a market index. I want to estimate the causal effect of our
  pricing strategy on revenue using CausalImpact. I use Python.
rubric:
  pedagogy:
    - "Does the response explain how CausalImpact uses control series to build the counterfactual — that it models the pre-period relationship between outcome and controls, then projects what the outcome WOULD have been?"
    - "Does the response explain what the posterior tail-area probability means and how to interpret it (e.g., p < 0.05 means strong evidence of an effect)?"
    - "Does the response explain the difference between CausalImpact (with controls) and CausalArima (without controls) in terms of confounding absorption?"
  safety:
    - "Does the response warn that control series must NOT have been affected by the intervention — otherwise the counterfactual is contaminated?"
    - "Does the response warn that even with controls, concurrent events that affect only the treated series remain a threat?"
  actionable:
    - "Does the response provide complete CausalImpact code with pre-period model diagnostics (MAPE, residual checks)?"
    - "Does the response include a visualization showing actual vs counterfactual with credible intervals?"
