name: experiments_pedagogy_clean
description: Experiments skill with clean RCT — must explain balance and inference clearly
layer: 4
skill: causal-experiments
references:
  - references/assumptions/experiments.md
  - references/method-registry.md
  - references/lessons.md
user_message: |
  We ran a randomized A/B test on our mobile app. 10,000 users were randomly
  assigned to a new onboarding flow (treatment) or the existing flow (control).
  Primary outcome is 7-day retention. I want to analyze the results. I use Python.
rubric:
  pedagogy:
    - "Does the response explain why randomization enables causal inference (eliminates confounding) in accessible language?"
    - "Does the response explain what a balance check verifies and why it matters even with randomization?"
    - "Does the response explain confidence intervals and what they mean for business decisions?"
  safety:
    - "Does the response check for common experimental threats (attrition, contamination, multiple comparisons) before estimating?"
    - "Does the response explain that statistical significance alone doesn't imply practical significance?"
  actionable:
    - "Does the response provide a complete analysis pipeline: balance check → estimate → inference → interpretation?"
    - "Does the response include effect size context (not just p-value) to support business decision-making?"
