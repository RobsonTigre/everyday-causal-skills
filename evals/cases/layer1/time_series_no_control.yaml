name: time_series_no_control
description: Marketing campaign with pre/post time series — should recommend ITS/CausalImpact
layer: 1
skill: causal-planner
references:
  - references/decision-tree.md
  - references/method-registry.md
  - references/lessons.md
user_message: |
  We launched a TV advertising campaign on March 1st. We have daily website traffic
  data for the past 2 years. We don't have a control group — the campaign was
  nationwide. We want to know if the campaign increased traffic. I use Python.
expected:
  rubric:
    - "Does the response recommend an interrupted time series method (ITS, CausalImpact, segmented regression, or CausalArima)?"
    - "Does the response identify the absence of a control group as a key design limitation?"
    - "Does the response warn about the threat of concurrent events / confounding at the intervention date?"
  must_not_recommend: [iv, rdd, matching]
