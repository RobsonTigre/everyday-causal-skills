name: sc_basic
description: Basic synthetic control with 1 treated unit and known gap
layer: 3
skill: causal-sc
references:
  - references/assumptions/sc.md
  - references/method-registry.md
  - references/lessons.md
dataset: evals/data/sc_basic_l3.csv
language: python
user_message: |
  I have panel data for 10 units over 30 time periods. Unit 1 received treatment at
  period 21. I want to estimate the treatment effect using synthetic control.
  The data is loaded as df. Use Python. Use only numpy, pandas, and scipy (no scpi_pkg
  or other specialized SC packages). Implement SC weights via constrained optimization.
  In your code, print the main treatment effect estimate as ESTIMATE:<value> (e.g., print(f'ESTIMATE:{gap_estimate}')).
expected:
  true_effect: 5.0
  tolerance: 5.0
  must_include: [pre_treatment_fit]
