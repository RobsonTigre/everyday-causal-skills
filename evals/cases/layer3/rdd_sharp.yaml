name: rdd_sharp
description: Sharp RDD with known treatment effect
layer: 3
skill: causal-rdd
references:
  - references/assumptions/rdd.md
  - references/method-registry.md
  - references/lessons.md
dataset: evals/data/rdd_sharp_l3.csv
language: r
user_message: |
  Students get a scholarship if their test score is >= 70. I have data on 3000
  students. Estimate the effect of the scholarship on college GPA using sharp RDD.
  The data is loaded as df. Use R.
  In your code, print the main RDD treatment effect estimate as ESTIMATE:<value> (e.g., cat('ESTIMATE:', rd_estimate, '\n')).
expected:
  true_effect: 0.5
  tolerance: 0.3
  must_include: [bandwidth, manipulation_test]
